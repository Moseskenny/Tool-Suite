<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolSuite Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="brand">
                <div class="logo-icon"></div>
                <h1>ToolSuite</h1>
            </div>
            <div class="nav-group">
                <button class="nav-btn" onclick="selectTool('compress')" id="btn-compress">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    Image Compressor
                </button>
                <button class="nav-btn" onclick="selectTool('organize')" id="btn-organize">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    File Organizer
                </button>
                <button class="nav-btn" onclick="selectTool('convert')" id="btn-convert">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Doc Converter
                </button>
                <button class="nav-btn" onclick="selectTool('expense')" id="btn-expense">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                    Expense Analysis
                </button>
            </div>
            <div class="sidebar-footer"><p>v1.0.0 | Premium</p></div>
        </nav>

        <main class="workspace">
            <div class="titlebar">
                <div class="window-controls">
                    <button class="win-btn min-btn" id="win-min"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                    <button class="win-btn max-btn" id="win-max"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg></button>
                    <button class="win-btn close-btn" id="win-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                </div>
            </div>

            <div id="loading-bar" class="loading-bar"></div>
            
            <header class="workspace-header animate-fade">
                <h2 id="tool-title">Welcome</h2>
                <p id="tool-description">Select a tool to begin.</p>
            </header>

            <section class="content-area animate-slide-up">
                <div id="drop-zone" class="drop-zone elegant-card">
                    <div class="drop-zone-content">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <p>Click to <strong>Select File</strong> or Drag & Drop</p>
                    </div>
                </div>
                <input type="file" id="file-input" multiple hidden>

                <div id="compressor-controls" class="tool-ui elegant-card" style="display:none; margin-top: 20px;">
                    <div class="slider-group">
                        <div class="slider-header"><span>Quality</span><span id="quality-val" class="accent-text">80%</span></div>
                        <input type="range" id="quality-slider" min="1" max="100" value="80" class="modern-slider">
                    </div>
                    <div class="preview-comparison">
                        <div class="preview-box"><label>Original</label><img id="original-preview"></div>
                        <div class="preview-box"><label>Compressed</label><img id="compressed-preview"></div>
                    </div>
                </div>

                <div id="converter-controls" class="tool-ui elegant-card" style="display:none; margin-top: 20px;">
                    <div class="converter-status">
                        <span id="detected-ext" class="format-badge">...</span>
                        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        <select id="target-format" class="modern-select">
                            <option value="">Select a file first</option>
                        </select>
                    </div>
                </div>

                <div class="action-bar" id="action-bar" style="display:none; margin-top: 25px; text-align: center;">
                    <button class="btn-primary" id="process-btn" onclick="processFiles()">Process Task</button>
                </div>

                <div id="preview-section" class="preview-section" style="margin-top: 20px;"></div>
                
                <div style="text-align: center; margin-top: 20px;">
                    <button id="download-btn" class="btn-download" style="display:none;">📥 Save Processed Files</button>
                </div>
                <div class="sidebar-footer">
    <hr class="footer-divider">
    <a href="#" id="github-btn" class="support-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="github-icon">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
        </svg>
        <span>Support the Dev</span>
    </a>
</div>
            </section>
        </main>
    </div>
    <div id="toast" class="toast">Task Completed!</div>
    <script src="renderer.js"></script>
</body>
</html>
